<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
</head>
<h2>How can we help?</h2>
<body>
    <form>

<fieldset> 
    <legend><b> Request for Proposal</b></legend>
   <table>
        <tr>
            <td>Your Company:</td>
            <td><input type="text" id="yc" size="20">
            </td>
        </tr>
        <tr>
            <td>Email:</td>
            <td><input type="email" id="em" size="20"></td>
        </tr>
        <tr>
            <td>Username:</td>
            <td><input type="text" id="un" size="20"></td>
        </tr>
        <tr>
            <td>Password:</td>
            <td><input type="password" id="ps" size="20"></td>
        </tr>
        <tr>
            <td>Your business: </td>
            <td>
                <textarea placeholder="Briefly describe your business in this place:"></textarea>
            </td>
        </tr>

<tr>
                <td valign="top"> Company Size:</td>
                <td>
                    <input type="radio" name="Company size"> Less than 10 <br>
                    <input type="radio" name="Company size">  11 to 50 <br>
                    <input type="radio" name="Company size">  50 to 200 <br>
                    <input type="radio" name="Company size">  Over 200 <br>
                </td>
            </tr>
<tr>            
    <td>Services:</td>
                <td>
                    <input type="checkbox"> Brand Identity
                    <input type="checkbox"> New Website
                    <input type="checkbox"> Web Redesign
                    <br>

                </td>
 </tr>
            <tr>
                <td>Timeline:</td>
                <td>
                    <select> 
                        <option> Immediately </option>
                        <option> 1-2 weeks</option>
                        <option> 3-6 weeks </option>
                        <option> 7-2 months </option>
                    </select>
                </td>
            </tr>
            <tr>
                <td></td>
                <td><input type="submit" value="Send to dev/design"></td>
            </tr>
    </table>
</fieldset>
    </form>
</body>
</html>
